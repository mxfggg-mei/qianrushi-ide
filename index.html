<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCT-100 化工过程控制实训装置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
        }
        .container { text-align: center; padding: 40px; }
        h1 { font-size: 2.2em; margin-bottom: 8px; }
        .subtitle { color: #a0a0c0; margin-bottom: 40px; font-size: 1.1em; }
        .cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
        .card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 32px 40px;
            width: 280px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .card .icon { font-size: 3em; margin-bottom: 16px; }
        .card h2 { font-size: 1.3em; margin-bottom: 10px; }
        .card p { color: #b0b0d0; font-size: 0.9em; line-height: 1.5; }
        .footer { margin-top: 48px; color: #666; font-size: 0.85em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PCT-100 化工过程控制实训装置</h1>
        <p class="subtitle">智能环境控制系统 | 物联网教学平台 | v2.6.50</p>

        <div class="cards">
            <a href="PCT/" class="card">
                <div class="icon">🖥️</div>
                <h2>远程控制面板</h2>
                <p>MQTT 实时监控温度、光照，远程控制灯光与风扇，支持自动/手动双模式切换</p>
            </a>
            <a href="Technical%20Documentation/" class="card">
                <div class="icon">📖</div>
                <h2>技术文档</h2>
                <p>系统架构、硬件模块、软件模块、MQTT 协议、串口命令操作指南与故障排查</p>
            </a>
        </div>

        <p class="footer">FairyCat（汐蓝云鸢）| Powered by ESP32 + MQTT</p>
    </div>
</body>
</html>
